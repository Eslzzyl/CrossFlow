<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrossFlow - 文件传输</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --success: #16a34a;
            --warning: #f59e0b;
            --bg-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #0ea5e9 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding-top: 8px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 上传区域 - 现在在顶部 */
        .upload-section {
            margin-bottom: 16px;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 32px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--primary);
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .upload-text {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 6px;
        }

        .upload-hint {
            font-size: 13px;
            color: var(--text-secondary);
        }

        #fileInput {
            display: none;
        }

        /* 上传列表容器 */
        .upload-list-container {
            margin-top: 16px;
        }

        /* 上传统计 */
        .upload-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #bfdbfe;
        }

        .upload-stats-text {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .upload-stats-text .success-count {
            color: var(--success);
            font-weight: 600;
        }

        .upload-stats-text .error-count {
            color: var(--danger);
            font-weight: 600;
        }

        .clear-completed-btn {
            padding: 6px 12px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .clear-completed-btn:hover {
            background: #f3f4f6;
            color: var(--text-primary);
        }

        /* 上传列表 */
        .upload-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .upload-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8fafc;
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .upload-item:hover {
            border-color: var(--primary-light);
        }

        .upload-item.success {
            border-color: var(--success);
            background: #f0fdf4;
        }

        .upload-item.error {
            border-color: var(--danger);
            background: #fef2f2;
        }

        .upload-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .upload-item-info {
            flex: 1;
            min-width: 0;
        }

        .upload-item-name {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .upload-item-size {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .upload-item-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }

        .upload-item-remove {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            opacity: 0;
            transition: all 0.2s;
        }

        .upload-item:hover .upload-item-remove {
            opacity: 1;
        }

        .upload-item-remove:hover {
            background: #fee2e2;
            color: var(--danger);
        }

        .upload-item.success .upload-item-remove,
        .upload-item.error .upload-item-remove {
            opacity: 1;
        }

        .upload-progress {
            width: 80px;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .upload-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .upload-status-icon {
            font-size: 18px;
        }

        .upload-status-text {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 50px;
            text-align: right;
        }

        /* 面包屑 */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 10px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb .separator {
            color: var(--text-secondary);
        }

        /* 文件列表 */
        .file-list {
            list-style: none;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s;
            border-radius: 8px;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #f8fafc;
        }

        .file-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .file-icon.folder {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
        }

        .file-icon.file {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .file-actions {
            display: flex;
            gap: 8px;
        }

        /* 按钮 */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 密码验证模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .modal h2 {
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .modal p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .password-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        .password-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-error {
            color: var(--danger);
            font-size: 14px;
            margin-bottom: 16px;
        }

        /* 文件预览模态框 */
        #previewModal {
            z-index: 3000;
            padding: 20px;
        }

        .preview-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            max-width: 95vw;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow-lg);
        }

        .preview-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.2s;
        }

        .preview-close:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: scale(1.1);
        }

        .preview-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 300px;
            min-height: 200px;
            background: #000;
        }

        .preview-content img {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
        }

        .preview-content video {
            max-width: 90vw;
            max-height: 80vh;
            outline: none;
        }

        .preview-content pre {
            max-width: 90vw;
            max-height: 80vh;
            overflow: auto;
            padding: 24px;
            background: #1f2937;
            color: #e5e7eb;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .preview-info {
            padding: 12px 20px;
            background: #f8fafc;
            border-top: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
        }

        .preview-loading {
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .preview-loading .spinner {
            width: 32px;
            height: 32px;
            border-color: rgba(255, 255, 255, 0.3);
            border-top-color: white;
            margin: 0;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 16px;
            }

            .file-icon {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            .upload-progress {
                width: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- 密码验证模态框 -->
    <div class="modal-overlay" id="passwordModal" style="display: none;">
        <div class="modal">
            <div class="modal-icon">🔒</div>
            <h2>需要密码</h2>
            <p>此服务器已启用密码保护，请输入密码继续</p>
            <input type="password" class="password-input" id="passwordInput" placeholder="输入密码">
            <div class="modal-error" id="passwordError"></div>
            <button class="btn btn-primary" onclick="verifyPassword()" style="width: 100%;">验证</button>
        </div>
    </div>

    <!-- 文件预览模态框 -->
    <div class="modal-overlay" id="previewModal" style="display: none;" onclick="closePreviewOnBackground(event)">
        <div class="preview-container" onclick="event.stopPropagation()">
            <button class="preview-close" onclick="closePreview()">×</button>
            <div class="preview-content" id="previewContent"></div>
            <div class="preview-info" id="previewInfo"></div>
        </div>
    </div>

    <div class="container">
        <!-- 上传区域 - 移到顶部 -->
        <div class="card upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击或拖拽文件到此处上传</div>
                <div class="upload-hint">支持多文件上传，单个文件最大 100GB</div>
                <input type="file" id="fileInput" multiple>
            </div>
            <!-- 上传列表 -->
            <div class="upload-list-container" id="uploadListContainer" style="display: none;">
                <div class="upload-stats" id="uploadStats"></div>
                <div class="upload-list" id="uploadList"></div>
            </div>
        </div>

        <!-- 文件列表 -->
        <div class="card">
            <div class="card-title">📂 文件列表</div>
            <div class="breadcrumb" id="breadcrumb">
                <a href="#" data-path="">根目录</a>
            </div>
            <ul class="file-list" id="fileList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </ul>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentPath = '';
        let isAuthenticated = false;
        let authToken = localStorage.getItem('crossflow_auth');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            setupUpload();
        });

        // 检查认证状态
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/check', {
                    headers: authToken ? { 'Authorization': authToken } : {}
                });
                const result = await response.json();

                if (result.require_auth) {
                    if (authToken && result.authenticated) {
                        isAuthenticated = true;
                        loadFiles();
                    } else {
                        showPasswordModal();
                    }
                } else {
                    isAuthenticated = true;
                    loadFiles();
                }
            } catch (error) {
                // 如果接口不存在，说明旧版本，直接加载
                isAuthenticated = true;
                loadFiles();
            }
        }

        // 显示密码模态框
        function showPasswordModal() {
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('passwordInput').focus();
            document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyPassword();
            });
        }

        // 验证密码
        async function verifyPassword() {
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('passwordError');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const result = await response.json();

                if (result.success) {
                    authToken = result.token;
                    localStorage.setItem('crossflow_auth', authToken);
                    isAuthenticated = true;
                    document.getElementById('passwordModal').style.display = 'none';
                    loadFiles();
                } else {
                    errorDiv.textContent = '密码错误';
                    document.getElementById('passwordInput').value = '';
                }
            } catch (error) {
                errorDiv.textContent = '验证失败，请重试';
            }
        }

        // 获取请求头
        function getHeaders() {
            return authToken ? { 'Authorization': authToken } : {};
        }

        // 加载文件列表
        async function loadFiles(path = '') {
            if (!isAuthenticated) return;

            currentPath = path;
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            `;

            try {
                const response = await fetch(`/api/files?path=${encodeURIComponent(path)}`, {
                    headers: getHeaders()
                });

                if (response.status === 401) {
                    isAuthenticated = false;
                    localStorage.removeItem('crossflow_auth');
                    showPasswordModal();
                    return;
                }

                const result = await response.json();

                if (result.success) {
                    renderFiles(result.data);
                    updateBreadcrumb(result.data.current_path, result.data.parent_path);
                } else {
                    showToast('加载失败: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('网络错误: ' + error.message, 'error');
            }
        }

        // 渲染文件列表
        function renderFiles(data) {
            const fileList = document.getElementById('fileList');

            if (data.files.length === 0) {
                fileList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <p>空文件夹</p>
                    </div>
                `;
                return;
            }

            fileList.innerHTML = data.files.map(file => `
                <li class="file-item">
                    <div class="file-icon ${file.is_dir ? 'folder' : 'file'}">
                        ${file.is_dir ? '📁' : getFileIcon(file.name)}
                    </div>
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.name)}</div>
                        <div class="file-meta">
                            ${file.is_dir ? '文件夹' : formatSize(file.size)}
                            ${file.modified ? ' · ' + file.modified : ''}
                        </div>
                    </div>
                    <div class="file-actions">
                        ${file.is_dir
                            ? `<button class="btn btn-secondary" onclick="loadFiles('${escapeHtml(file.path)}')">打开</button>`
                            : `
                                ${canPreview(file.name) ? `<button class="btn btn-secondary btn-sm" onclick='openPreview({"name": "${escapeHtml(file.name)}", "path": "${escapeHtml(file.path)}", "size": ${file.size || 0}})'>预览</button>` : ''}
                                <a href="/api/download/${encodeURIComponent(file.path)}" class="btn btn-primary" download>下载</a>
                              `
                        }
                        <button class="btn btn-danger btn-sm" onclick="deleteFile('${escapeHtml(file.path)}', '${escapeHtml(file.name)}')">删除</button>
                    </div>
                </li>
            `).join('');
        }

        // 删除文件
        async function deleteFile(path, name) {
            if (!confirm(`确定要删除 "${name}" 吗？`)) return;

            try {
                const response = await fetch(`/api/delete?path=${encodeURIComponent(path)}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });

                if (response.status === 401) {
                    isAuthenticated = false;
                    showPasswordModal();
                    return;
                }

                const result = await response.json();

                if (result.success) {
                    showToast(`已删除: ${name}`, 'success');
                    loadFiles(currentPath);
                } else {
                    showToast('删除失败: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('删除错误: ' + error.message, 'error');
            }
        }

        // 更新面包屑
        function updateBreadcrumb(currentPath, parentPath) {
            const breadcrumb = document.getElementById('breadcrumb');

            if (!currentPath || currentPath === '/') {
                breadcrumb.innerHTML = '<a href="#" data-path="">根目录</a>';
                return;
            }

            const parts = currentPath.split('/').filter(p => p);
            let html = '<a href="#" data-path="">根目录</a>';
            let path = '';

            parts.forEach((part, index) => {
                path += (path ? '/' : '') + part;
                html += `<span class="separator">/</span>`;
                if (index === parts.length - 1) {
                    html += `<span>${escapeHtml(part)}</span>`;
                } else {
                    html += `<a href="#" data-path="${escapeHtml(path)}">${escapeHtml(part)}</a>`;
                }
            });

            breadcrumb.innerHTML = html;

            breadcrumb.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadFiles(e.target.dataset.path);
                });
            });
        }

        // 设置上传功能
        function setupUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');

            uploadArea.addEventListener('click', () => fileInput.click());

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });

            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
                fileInput.value = '';
            });
        }

        // 全局上传项管理
        let uploadItems = [];

        // 更新统计信息
        function updateUploadStats() {
            const statsEl = document.getElementById('uploadStats');
            if (uploadItems.length === 0) {
                statsEl.innerHTML = '';
                return;
            }

            const totalCount = uploadItems.length;
            const successCount = uploadItems.filter(i => i.status === 'success').length;
            const errorCount = uploadItems.filter(i => i.status === 'error').length;
            const totalSize = uploadItems.reduce((sum, i) => sum + i.size, 0);
            const uploadedSize = uploadItems
                .filter(i => i.status === 'success')
                .reduce((sum, i) => sum + i.size, 0);

            const hasCompleted = successCount > 0 || errorCount > 0;

            statsEl.innerHTML = `
                <div class="upload-stats-text">
                    已上传: <span class="success-count">${successCount}</span>/${totalCount} 个文件
                    ${errorCount > 0 ? `, <span class="error-count">${errorCount}</span> 个失败` : ''}
                    <span style="margin-left: 12px; color: var(--text-secondary);">
                        ${formatSize(uploadedSize)} / ${formatSize(totalSize)}
                    </span>
                </div>
                ${hasCompleted ? `<button class="clear-completed-btn" onclick="clearCompletedUploads()">清除已完成</button>` : ''}
            `;
        }

        // 清除已完成的上传项
        function clearCompletedUploads() {
            const completedIds = uploadItems
                .filter(i => i.status === 'success' || i.status === 'error')
                .map(i => i.id);

            completedIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.remove();
            });

            uploadItems = uploadItems.filter(i => i.status !== 'success' && i.status !== 'error');

            if (uploadItems.length === 0) {
                document.getElementById('uploadListContainer').style.display = 'none';
            } else {
                updateUploadStats();
            }
        }

        // 移除单个上传项
        function removeUploadItem(itemId) {
            const el = document.getElementById(itemId);
            if (el) {
                el.style.opacity = '0';
                el.style.transform = 'translateX(20px)';
                setTimeout(() => {
                    el.remove();
                    uploadItems = uploadItems.filter(i => i.id !== itemId);
                    if (uploadItems.length === 0) {
                        document.getElementById('uploadListContainer').style.display = 'none';
                    } else {
                        updateUploadStats();
                    }
                }, 200);
            }
        }

        // 处理文件上传
        async function handleFiles(files) {
            if (files.length === 0) return;
            if (!isAuthenticated) {
                showToast('请先通过密码验证', 'error');
                return;
            }

            const uploadListContainer = document.getElementById('uploadListContainer');
            const uploadList = document.getElementById('uploadList');
            uploadListContainer.style.display = 'block';

            for (const file of files) {
                const itemId = 'upload-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                const item = {
                    id: itemId,
                    file: file,
                    name: file.name,
                    size: file.size,
                    status: 'pending',
                    progress: 0
                };
                uploadItems.push(item);

                const itemEl = document.createElement('div');
                itemEl.className = 'upload-item';
                itemEl.id = itemId;
                itemEl.style.transition = 'all 0.2s';
                itemEl.innerHTML = `
                    <div class="upload-item-icon">${getFileIcon(file.name)}</div>
                    <div class="upload-item-info">
                        <div class="upload-item-name">${escapeHtml(file.name)}</div>
                        <div class="upload-item-size">${formatSize(file.size)}</div>
                    </div>
                    <div class="upload-item-status">
                        <div class="upload-progress">
                            <div class="upload-progress-bar" style="width: 0%"></div>
                        </div>
                        <span class="upload-status-text">等待中</span>
                        <button class="upload-item-remove" onclick="removeUploadItem('${itemId}')" title="移除">×</button>
                    </div>
                `;
                uploadList.appendChild(itemEl);
            }

            updateUploadStats();

            // 逐个上传
            for (const item of uploadItems.filter(i => i.status === 'pending')) {
                await uploadFile(item);
            }

            // 刷新文件列表
            loadFiles(currentPath);
        }

        // 上传单个文件
        async function uploadFile(item) {
            const itemEl = document.getElementById(item.id);
            if (!itemEl) return; // 可能已被移除

            const progressBar = itemEl.querySelector('.upload-progress-bar');
            const statusText = itemEl.querySelector('.upload-status-text');

            item.status = 'uploading';
            statusText.textContent = '0%';

            const formData = new FormData();
            formData.append('file', item.file);

            try {
                const xhr = new XMLHttpRequest();

                const uploadPromise = new Promise((resolve, reject) => {
                    xhr.upload.addEventListener('progress', (e) => {
                        if (e.lengthComputable) {
                            const progress = Math.round((e.loaded / e.total) * 100);
                            progressBar.style.width = progress + '%';
                            statusText.textContent = progress + '%';
                        }
                    });

                    xhr.addEventListener('load', () => {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            resolve(xhr.response);
                        } else {
                            reject(new Error(`HTTP ${xhr.status}`));
                        }
                    });

                    xhr.addEventListener('error', () => reject(new Error('网络错误')));
                    xhr.addEventListener('abort', () => reject(new Error('已取消')));

                    xhr.open('POST', `/api/upload?path=${encodeURIComponent(currentPath)}`);
                    if (authToken) {
                        xhr.setRequestHeader('Authorization', authToken);
                    }
                    xhr.send(formData);
                });

                await uploadPromise;

                item.status = 'success';
                itemEl.classList.add('success');
                progressBar.style.width = '100%';
                statusText.innerHTML = '✓';
                updateUploadStats();

            } catch (error) {
                item.status = 'error';
                itemEl.classList.add('error');
                statusText.innerHTML = '✗';
                updateUploadStats();
                showToast(`上传失败: ${item.name}`, 'error');
            }
        }

        // ========== 文件预览功能 ==========

        // 支持的预览文件类型
        const PREVIEW_TYPES = {
            image: ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp', 'ico'],
            video: ['mp4', 'webm', 'ogg'],  // 仅浏览器原生支持
            text: ['txt', 'md', 'json', 'xml', 'yaml', 'yml', 'js', 'ts', 'jsx', 'tsx',
                   'html', 'htm', 'css', 'py', 'rs', 'go', 'java', 'c', 'cpp', 'h', 'hpp',
                   'rb', 'php', 'swift', 'kt', 'scala', 'r', 'pl', 'sh', 'bash', 'zsh',
                   'vim', 'sql', 'log', 'conf', 'config', 'ini', 'properties', 'env']
        };

        // 检查文件是否可预览
        function canPreview(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            return PREVIEW_TYPES.image.includes(ext) ||
                   PREVIEW_TYPES.video.includes(ext) ||
                   PREVIEW_TYPES.text.includes(ext);
        }

        // 获取文件预览类型
        function getPreviewType(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (PREVIEW_TYPES.image.includes(ext)) return 'image';
            if (PREVIEW_TYPES.video.includes(ext)) return 'video';
            if (PREVIEW_TYPES.text.includes(ext)) return 'text';
            return null;
        }

        // 打开预览
        async function openPreview(file) {
            const previewType = getPreviewType(file.name);
            if (!previewType) {
                showToast('该文件类型不支持预览', 'error');
                return;
            }

            const modal = document.getElementById('previewModal');
            const content = document.getElementById('previewContent');
            const info = document.getElementById('previewInfo');

            // 显示模态框和加载状态
            modal.style.display = 'flex';
            content.innerHTML = '<div class="preview-loading"><div class="spinner"></div>加载中...</div>';
            info.textContent = file.name;

            try {
                if (previewType === 'image') {
                    await openImagePreview(file, content);
                } else if (previewType === 'video') {
                    await openVideoPreview(file, content);
                } else if (previewType === 'text') {
                    await openTextPreview(file, content);
                }
            } catch (error) {
                content.innerHTML = `<div style="color: white; padding: 40px;">加载失败: ${escapeHtml(error.message)}</div>`;
            }
        }

        // 图片预览
        async function openImagePreview(file, content) {
            return new Promise((resolve, reject) => {
                const img = document.createElement('img');
                img.src = `/api/preview/${encodeURIComponent(file.path)}`;
                img.alt = file.name;

                // 添加认证头（通过设置请求头的方式）
                if (authToken) {
                    fetch(img.src, { headers: { 'Authorization': authToken } })
                        .then(response => {
                            if (response.ok) {
                                return response.blob();
                            }
                            throw new Error('Failed to load image');
                        })
                        .then(blob => {
                            img.src = URL.createObjectURL(blob);
                            content.innerHTML = '';
                            content.appendChild(img);
                            resolve();
                        })
                        .catch(reject);
                } else {
                    img.onload = () => {
                        content.innerHTML = '';
                        content.appendChild(img);
                        resolve();
                    };
                    img.onerror = () => reject(new Error('图片加载失败'));
                }
            });
        }

        // 视频预览
        async function openVideoPreview(file, content) {
            const ext = file.name.split('.').pop().toLowerCase();
            const mimeTypes = {
                'mp4': 'video/mp4',
                'webm': 'video/webm',
                'ogg': 'video/ogg'
            };
            const mimeType = mimeTypes[ext] || 'video/mp4';

            const video = document.createElement('video');
            video.controls = true;
            video.autoplay = true;
            video.style.maxWidth = '100%';
            video.style.maxHeight = '100%';

            // 视频使用直接的 URL，浏览器会自动处理 Range 请求
            const videoUrl = `/api/preview/${encodeURIComponent(file.path)}`;

            // 如果有认证 token，我们需要先获取视频内容
            if (authToken) {
                // 使用 fetch 获取视频流
                video.src = videoUrl;
                // 设置视频请求头需要通过 Service Worker 或代理，这里简化处理
                // 实际使用时视频可能需要特殊处理认证
            } else {
                video.src = videoUrl;
            }

            content.innerHTML = '';
            content.appendChild(video);

            // 添加错误处理
            video.onerror = () => {
                content.innerHTML = '<div style="color: white; padding: 40px;">视频加载失败</div>';
            };
        }

        // 文本预览
        async function openTextPreview(file, content) {
            try {
                const response = await fetch(`/api/preview/${encodeURIComponent(file.path)}`, {
                    headers: getHeaders()
                });

                if (response.status === 401) {
                    isAuthenticated = false;
                    showPasswordModal();
                    throw new Error('需要重新认证');
                }

                const result = await response.json();

                if (result.success) {
                    const pre = document.createElement('pre');
                    const code = document.createElement('code');
                    code.textContent = result.content;
                    pre.appendChild(code);
                    content.innerHTML = '';
                    content.appendChild(pre);
                } else {
                    throw new Error(result.error || '预览失败');
                }
            } catch (error) {
                throw error;
            }
        }

        // 关闭预览
        function closePreview() {
            const modal = document.getElementById('previewModal');
            const content = document.getElementById('previewContent');
            modal.style.display = 'none';
            content.innerHTML = ''; // 清理内容，停止视频播放
        }

        // 点击背景关闭预览
        function closePreviewOnBackground(event) {
            if (event.target.id === 'previewModal') {
                closePreview();
            }
        }

        // ESC 键关闭预览
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const previewModal = document.getElementById('previewModal');
                if (previewModal.style.display === 'flex') {
                    closePreview();
                }
            }
        });

        // 获取文件图标
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', webp: '🖼️', svg: '🖼️',
                mp4: '🎬', avi: '🎬', mkv: '🎬', mov: '🎬', webm: '🎬',
                mp3: '🎵', wav: '🎵', flac: '🎵', aac: '🎵', ogg: '🎵',
                pdf: '📄', doc: '📝', docx: '📝', txt: '📝', rtf: '📝',
                zip: '📦', rar: '📦', '7z': '📦', tar: '📦', gz: '📦',
                exe: '⚙️', dmg: '💿', pkg: '💿', deb: '💿', rpm: '💿',
                js: '📜', ts: '📜', jsx: '📜', tsx: '📜',
                html: '🌐', htm: '🌐', css: '🎨', scss: '🎨', sass: '🎨',
                json: '📋', xml: '📋', yaml: '📋', yml: '📋',
                md: '📖', csv: '📊', xls: '📊', xlsx: '📊',
                ppt: '📊', pptx: '📊',
                apk: '📱', ipa: '📱'
            };
            return icons[ext] || '📄';
        }

        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes === undefined || bytes === null) return '';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let size = bytes;
            let unitIndex = 0;
            while (size >= 1024 && unitIndex < units.length - 1) {
                size /= 1024;
                unitIndex++;
            }
            return size.toFixed(2) + ' ' + units[unitIndex];
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示提示
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
