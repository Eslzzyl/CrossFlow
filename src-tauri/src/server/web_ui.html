<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrossFlow - 文件传输</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            overflow-x: auto;
        }
        
        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        .breadcrumb .separator {
            color: #999;
        }
        
        .file-list {
            list-style: none;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        
        .file-item:last-child {
            border-bottom: none;
        }
        
        .file-item:hover {
            background: #f8f9ff;
        }
        
        .file-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 16px;
        }
        
        .file-icon.folder {
            background: #fff3cd;
        }
        
        .file-icon.file {
            background: #e3f2fd;
        }
        
        .file-info {
            flex: 1;
        }
        
        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .file-meta {
            font-size: 13px;
            color: #888;
        }
        
        .file-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .upload-area:hover,
        .upload-area.dragover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .upload-text {
            color: #666;
            margin-bottom: 8px;
        }
        
        .upload-hint {
            font-size: 13px;
            color: #999;
        }
        
        #fileInput {
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .card {
                padding: 16px;
            }
            
            .file-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 CrossFlow</h1>
            <p>局域网文件传输助手</p>
        </div>
        
        <div class="card">
            <div class="breadcrumb" id="breadcrumb">
                <a href="#" data-path="">根目录</a>
            </div>
            
            <ul class="file-list" id="fileList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </ul>
        </div>
        
        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击或拖拽文件到此处上传</div>
                <div class="upload-hint">支持多文件上传</div>
                <input type="file" id="fileInput" multiple>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        let currentPath = '';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadFiles();
            setupUpload();
        });
        
        // 加载文件列表
        async function loadFiles(path = '') {
            currentPath = path;
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            `;
            
            try {
                const response = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
                const result = await response.json();
                
                if (result.success) {
                    renderFiles(result.data);
                    updateBreadcrumb(result.data.current_path, result.data.parent_path);
                } else {
                    showToast('加载失败: ' + result.error);
                }
            } catch (error) {
                showToast('网络错误: ' + error.message);
            }
        }
        
        // 渲染文件列表
        function renderFiles(data) {
            const fileList = document.getElementById('fileList');
            
            if (data.files.length === 0) {
                fileList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <p>空文件夹</p>
                    </div>
                `;
                return;
            }
            
            fileList.innerHTML = data.files.map(file => `
                <li class="file-item">
                    <div class="file-icon ${file.is_dir ? 'folder' : 'file'}">
                        ${file.is_dir ? '📁' : getFileIcon(file.name)}
                    </div>
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.name)}</div>
                        <div class="file-meta">
                            ${file.is_dir ? '文件夹' : formatSize(file.size)}
                            ${file.modified ? ' · ' + file.modified : ''}
                        </div>
                    </div>
                    <div class="file-actions">
                        ${file.is_dir 
                            ? `<button class="btn btn-secondary" onclick="loadFiles('${escapeHtml(file.path)}')">打开</button>`
                            : `<a href="/api/download/${encodeURIComponent(file.path)}" class="btn btn-primary" download>下载</a>`
                        }
                    </div>
                </li>
            `).join('');
        }
        
        // 更新面包屑
        function updateBreadcrumb(currentPath, parentPath) {
            const breadcrumb = document.getElementById('breadcrumb');
            
            if (!currentPath || currentPath === '/') {
                breadcrumb.innerHTML = '<a href="#" data-path="">根目录</a>';
                return;
            }
            
            const parts = currentPath.split('/').filter(p => p);
            let html = '<a href="#" data-path="">根目录</a>';
            let path = '';
            
            parts.forEach((part, index) => {
                path += (path ? '/' : '') + part;
                html += `<span class="separator">/</span>`;
                if (index === parts.length - 1) {
                    html += `<span>${escapeHtml(part)}</span>`;
                } else {
                    html += `<a href="#" data-path="${escapeHtml(path)}">${escapeHtml(part)}</a>`;
                }
            });
            
            breadcrumb.innerHTML = html;
            
            // 绑定面包屑点击事件
            breadcrumb.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadFiles(e.target.dataset.path);
                });
            });
        }
        
        // 设置上传功能
        function setupUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            
            uploadArea.addEventListener('click', () => fileInput.click());
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
            
            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });
        }
        
        // 处理文件上传
        async function handleFiles(files) {
            if (files.length === 0) return;

            // 逐个上传文件，避免请求过大
            let successCount = 0;
            let failCount = 0;

            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);

                showToast(`正在上传: ${file.name} (${formatSize(file.size)})...`);

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 300000); // 5分钟超时

                    const response = await fetch(`/api/upload?path=${encodeURIComponent(currentPath)}`, {
                        method: 'POST',
                        body: formData,
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const result = await response.json();

                    if (result.success) {
                        successCount++;
                    } else {
                        failCount++;
                        console.error('Upload failed:', result.error);
                    }
                } catch (error) {
                    failCount++;
                    console.error('Upload error:', error);
                    if (error.name === 'AbortError') {
                        showToast(`上传超时: ${file.name}`);
                    } else {
                        showToast(`上传失败: ${file.name} - ${error.message}`);
                    }
                }
            }

            if (successCount > 0) {
                showToast(`成功上传 ${successCount} 个文件${failCount > 0 ? `，${failCount} 个失败` : ''}`);
                loadFiles(currentPath);
            } else if (failCount > 0) {
                showToast(`上传失败: ${failCount} 个文件`);
            }
        }
        
        // 获取文件图标
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', webp: '🖼️',
                mp4: '🎬', avi: '🎬', mkv: '🎬', mov: '🎬',
                mp3: '🎵', wav: '🎵', flac: '🎵', aac: '🎵',
                pdf: '📄', doc: '📝', docx: '📝', txt: '📝',
                zip: '📦', rar: '📦', '7z': '📦', tar: '📦',
                exe: '⚙️', dmg: '💿', pkg: '💿',
                js: '📜', ts: '📜', html: '🌐', css: '🎨',
                json: '📋', xml: '📋', yaml: '📋'
            };
            return icons[ext] || '📄';
        }
        
        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes === undefined || bytes === null) return '';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let size = bytes;
            let unitIndex = 0;
            while (size >= 1024 && unitIndex < units.length - 1) {
                size /= 1024;
                unitIndex++;
            }
            return size.toFixed(2) + ' ' + units[unitIndex];
        }
        
        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
